name: CI
on: [push, pull_request]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: 3.11
          environment-file: environment.yaml
          activate-environment: zephyr-transit
          
      - name: Format check
        run: |
          conda activate zephyr-transit
          ruff format --check .
        shell: bash -l {0}
        
      - name: Lint
        run: |
          conda activate zephyr-transit
          ruff check .
        shell: bash -l {0}
        
      - name: Test
        run: |
          conda activate zephyr-transit
          pytest
        shell: bash -l {0}